<!DOCTYPE html>
<html>
<body style="margin: 0; padding: 0; background-color: black;">
    
    <div style="width: 100vw; height: 100vh; background-image: url('123.jpeg'); background-size: cover; background-position: center; position: relative;">
        
        <div id="timer" style="
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'MingLiU', '細明體', serif;
            color: black;
            font-size: 79px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            white-space: nowrap; /* 這行就是關鍵：強制不換行 */
        ">
        </div>

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // 取得各項時間資訊並補零 (例如 03/05 09:05:01)
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // 組合格式 MM/DD HH:MM:SS
            document.getElementById('timer').innerText = `${month}/${day} ${hours}:${minutes}:${seconds}`;
        }

        // 每秒執行一次 updateTime 函數
        setInterval(updateTime, 1000);
        
        // 初始執行一次，避免剛打開網頁時空白一秒
        updateTime();
    </script>

</body>
</html>
